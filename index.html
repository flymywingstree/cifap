<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Number Guessing Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 100px;
      background-color: #f0f0f0;
    }
    input {
      padding: 10px;
      font-size: 18px;
      width: 100px;
    }
    button {
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      margin: 5px;
    }
    #message {
      font-size: 22px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>🎯 Number Guessing Game</h1>

  <p>Select difficulty:</p>
  <button onclick="startGame(50)">🟢 Easy (1-50)</button>
  <button onclick="startGame(100)">🟡 Medium (1-100)</button>
  <button onclick="startGame(200)">🔴 Hard (1-200)</button>

  <div id="gameArea" style="display:none; margin-top:20px;">
    <p id="rangeText"></p>
    <input type="number" id="guessInput" placeholder="?">
    <button onclick="checkGuess()">Guess!</button>
    <p id="message"></p>
    <p id="attempts"></p>
  </div>

  <script>
    let number, attempts, maxNumber;

    function startGame(max) {
      maxNumber = max;
      number = Math.floor(Math.random() * max) + 1;
      attempts = 0;

      document.getElementById("gameArea").style.display = "block";
      document.getElementById("rangeText").textContent = `Guess a number between 1 and ${max}!`;
      document.getElementById("message").textContent = "";
      document.getElementById("attempts").textContent = "";
      document.getElementById("guessInput").value = "";
    }

    function checkGuess() {
      const guess = parseInt(document.getElementById("guessInput").value);
      attempts++;

      if (isNaN(guess)) {
        document.getElementById("message").textContent = "Please enter a number!";
      } else if (guess < number) {
        document.getElementById("message").textContent = "📉 Too low! Try again.";
      } else if (guess > number) {
        document.getElementById("message").textContent = "📈 Too high! Try again.";
      } else {
        document.getElementById("message").textContent = `🎉 Correct! You got it in ${attempts} attempts!`;
      }

      document.getElementById("attempts").textContent = `Attempts: ${attempts}`;
    }
  </script>

</body>
</html>
